<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>롱테일 금맥 스캐너 — 키워드 딥다이브</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0d1117; color: #c9d1d9; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 20px; max-width: 1200px; margin: 0 auto; }

/* ── 롱테일 금맥 섹션 ── */
.goldmine-wrapper {
    margin: 40px 0;
}
.goldmine-header {
    border-top: 3px solid #d4a017;
    padding-top: 24px;
    margin-bottom: 24px;
}
.goldmine-header h2 {
    font-size: 1.4em;
    color: #d4a017;
    margin: 0 0 6px;
}
.goldmine-header .subtitle {
    color: #8b949e;
    font-size: 0.88em;
}
.goldmine-header .scan-time {
    color: #6e7681;
    font-size: 0.8em;
    margin-top: 4px;
}

/* 금맥 카테고리 요약 카드 */
.gm-category-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    gap: 10px;
    margin-bottom: 28px;
}
.gm-cat-card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 12px 14px;
    text-align: center;
}
.gm-cat-card .cat-icon { font-size: 1.6em; }
.gm-cat-card .cat-name {
    font-size: 0.78em;
    color: #8b949e;
    margin: 4px 0 2px;
    line-height: 1.3;
}
.gm-cat-card .cat-count {
    font-size: 1.3em;
    font-weight: 700;
    color: #d4a017;
}

/* 금맥 TOP 키워드 테이블 */
.gm-section-title {
    font-size: 1.1em;
    font-weight: 700;
    color: #f0f6fc;
    margin: 28px 0 12px;
    padding-bottom: 6px;
    border-bottom: 2px solid #30363d;
}
.gm-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85em;
    margin-bottom: 20px;
}
.gm-table th {
    text-align: left;
    padding: 8px 10px;
    background: #0d1117;
    color: #8b949e;
    font-weight: 600;
    font-size: 0.85em;
    border-bottom: 1px solid #30363d;
}
.gm-table td {
    padding: 10px;
    border-bottom: 1px solid #21262d;
    vertical-align: top;
}
.gm-table tr:hover { background: #1c2128; }

.gm-keyword {
    font-weight: 600;
    color: #f0f6fc;
}
.gm-root-tag {
    display: inline-block;
    background: #21262d;
    color: #8b949e;
    font-size: 0.75em;
    padding: 1px 6px;
    border-radius: 3px;
    margin-left: 6px;
}
.gm-badge {
    display: inline-block;
    font-size: 0.75em;
    padding: 2px 7px;
    border-radius: 4px;
    margin: 2px 2px 2px 0;
    font-weight: 600;
}
.gm-badge.drug_nutrient { background: #f8514920; color: #f85149; }
.gm-badge.supplement_vs_drug { background: #58a6ff20; color: #58a6ff; }
.gm-badge.ingredient_analysis { background: #3fb95020; color: #3fb950; }
.gm-badge.pharma_news { background: #f0883e20; color: #f0883e; }
.gm-badge.pharmacist_faq { background: #d2a8ff20; color: #d2a8ff; }

.gm-value {
    font-weight: 700;
    color: #d4a017;
    font-size: 1.05em;
}
.gm-gap-label {
    font-size: 0.78em;
    padding: 2px 6px;
    border-radius: 3px;
}
.gm-gap-label.gap-high { background: #3fb95020; color: #3fb950; }
.gm-gap-label.gap-mid { background: #f0883e20; color: #f0883e; }
.gm-gap-label.gap-low { background: #f8514920; color: #f85149; }
.gm-gap-label.gap-none { background: #21262d; color: #6e7681; }

.gm-stars { color: #d4a017; letter-spacing: 1px; }

/* 뿌리별 롱테일 아코디언 */
.gm-root-section {
    margin-bottom: 16px;
    border: 1px solid #30363d;
    border-radius: 8px;
    overflow: hidden;
}
.gm-root-header {
    background: #161b22;
    padding: 12px 16px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    user-select: none;
    color: #c9d1d9;
}
.gm-root-header:hover { background: #1c2128; }
.gm-root-header .root-name {
    font-weight: 700;
    font-size: 1em;
    color: #f0f6fc;
}
.gm-root-header .root-count {
    font-size: 0.82em;
    color: #8b949e;
}
.gm-root-body {
    display: none;
    padding: 0;
    background: #0d1117;
}
.gm-root-body.open { display: block; }
.gm-root-body table { margin-bottom: 0; }
.gm-root-body .gm-table td { padding: 8px 10px; }

/* 반응형 */
@media (max-width: 640px) {
    .gm-category-grid { grid-template-columns: repeat(2, 1fr); }
    .gm-table { font-size: 0.82em; }
    .gm-table th, .gm-table td { padding: 6px 8px; }
}

</style>
</head>
<body>
<div class="goldmine-wrapper" id="goldmine-section"><div class="goldmine-header"><h2>롱테일 금맥 스캐너</h2><div class="subtitle">ㄱ~ㅎ 자동완성 롱테일 <strong>0</strong>개 발굴 · 금맥 카테고리 매칭 <strong>0</strong>개</div><div class="scan-time">마지막 스캔: 2026-03-07 15:10</div></div><div class="gm-category-grid"><div class="gm-cat-card"><div class="cat-icon">💊</div><div class="cat-name">①처방약+영양제<br>병용</div><div class="cat-count">0개</div></div>
<div class="gm-cat-card"><div class="cat-icon">⚖️</div><div class="cat-name">②건기식 vs<br>의약품</div><div class="cat-count">0개</div></div>
<div class="gm-cat-card"><div class="cat-icon">🔬</div><div class="cat-name">③성분표<br>분석</div><div class="cat-count">0개</div></div>
<div class="gm-cat-card"><div class="cat-icon">📰</div><div class="cat-name">④신약/정책<br>뉴스 해설</div><div class="cat-count">0개</div></div>
<div class="gm-cat-card"><div class="cat-icon">🗣️</div><div class="cat-name">⑤약사<br>FAQ</div><div class="cat-count">0개</div></div>
</div><div class="gm-section-title">금맥 TOP 키워드 (약사가치 상위)</div><p style="color:#8b949e;">데이터가 아직 없습니다.</p><div class="gm-section-title">뿌리별 롱테일 전체</div></div>
<script>
function toggleGmRoot(el) {
    var body = el.nextElementSibling;
    var arrow = el.querySelector('.arrow');
    if (body.classList.contains('open')) {
        body.classList.remove('open');
        arrow.textContent = '▸';
    } else {
        body.classList.add('open');
        arrow.textContent = '▾';
    }
}
</script>
</body>
</html>
