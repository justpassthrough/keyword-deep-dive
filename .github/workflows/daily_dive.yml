name: Daily Deep Dive
on:
  schedule:
    - cron: '0 23 * * *'   # 08:00 KST
    - cron: '0 11 * * *'   # 20:00 KST
  workflow_dispatch: {}
permissions:
  contents: write
  pages: write
jobs:
  dive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Run dive
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID_DIVE }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET_DIVE }}
        run: python scripts/dive.py
      - name: Build dashboard
        run: python scripts/build_dashboard.py
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/
          git diff --cached --quiet || git commit -m "dive: $(TZ=Asia/Seoul date +%Y-%m-%d\ %H:%M)"
          git push
